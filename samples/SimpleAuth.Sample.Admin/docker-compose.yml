services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: simpleauth
      POSTGRES_USER: simpleauth
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simpleauth"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
